name: 🐛 奇点缺陷报告
description: 报告奇点中可以复现的缺陷
title: "[缺陷]："
body:
  - type: markdown
    attributes:
      value: |
        提交前请搜索[奇点 Issue 列表](https://github.com/SparkElf/singularity/issues)。疑似安全漏洞请改用[私密安全报告流程](https://github.com/SparkElf/singularity/security/policy)。
  - type: checkboxes
    attributes:
      label: 是否存在已有相关 issue？
      description: |
        请搜索奇点仓库，确认是否已经有人报告相同缺陷。
      options:
        - label: |
            我已搜索现有奇点 Issue
          required: true
  - type: checkboxes
    attributes:
      label: 是否能在默认主题（日间/夜间）下重现该问题？
      description: |
        请确认该问题能在默认主题下重现。
      options:
        - label: |
            我能在默认主题下重现该问题
          required: true
  - type: checkboxes
    attributes:
      label: 问题是否可能是由扩展引起的？
      description: |
        请注意，代码片段、插件、主题、挂件或其他扩展可能会引发问题。
      options:
        - label: |
            我已排除扩展导致问题的可能性。
          required: true
  - type: textarea
    attributes:
      label: 问题描述
      description: |
        请尽可能清晰地描述您遇到的问题。
    validations:
      required: true
  - type: textarea
    attributes:
      label: 预期结果
      description: |
        请尽可能清晰准确地描述您期望的结果。
    validations:
      required: true
  - type: textarea
    attributes:
      label: 截图或屏幕录制展示
      description: |
        请尝试附加截图或视频来描述您遇到的问题。
    validations:
      required: false
  - type: textarea
    attributes:
      label: 版本环境
      value: |
        - 版本：
        - 操作系统：
        - 浏览器（如果使用了）：
      render: markdown
    validations:
      required: true
  - type: textarea
    attributes:
      label: 日志文件
      description: |
        当前运行时日志通常位于 `工作空间/temp/siyuan.log`。附加日志前请移除凭据、个人数据、工作空间内容和令牌。
    validations:
      required: true
  - type: textarea
    attributes:
      label: 更多信息
      description: |
        请提供其他附加信息以帮助我们诊断问题。
    validations:
      required: false
