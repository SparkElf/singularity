name: ✨ 奇点功能请求
description: 为奇点提出范围明确的能力或产品变更
title: "[功能]："
body:
  - type: markdown
    attributes:
      value: |
        奇点仍处于持续开发阶段。提出实现方案前，请先搜索[奇点 Issue 列表](https://github.com/SparkElf/singularity/issues)，并说明需要解决的用户问题。
  - type: checkboxes
    attributes:
      label: 是否已有相同建议？
      options:
        - label: 我已搜索现有奇点 Issue
          required: true
  - type: textarea
    attributes:
      label: 您在什么场景下需要这个功能？
      description: |
        请尽可能清晰准确地描述用户、问题和使用场景。
    validations:
      required: true
  - type: textarea
    attributes:
      label: 描述最优解决方案
      description: |
        请说明期望行为和验收标准，也可以链接类似实现作为参考。
    validations:
      required: true
  - type: textarea
    attributes:
      label: 描述候选解决方案
      description: |
        请说明可以接受的替代结果或取舍。
    validations:
      required: false
  - type: textarea
    attributes:
      label: 其他信息
      description: |
        请提供有关此功能建议的任何附加信息。
    validations:
      required: false
