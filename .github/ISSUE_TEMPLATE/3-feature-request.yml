name: ✨ Singularity feature request
description: Propose a scoped capability or product change for Singularity
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Singularity is under active development. Search the [Singularity issue tracker](https://github.com/SparkElf/singularity/issues) and describe the user problem before proposing an implementation.
  - type: checkboxes
    attributes:
      label: Is there an existing request for this?
      options:
        - label: I have searched the existing Singularity issues
          required: true
  - type: textarea
    attributes:
      label: In what scenarios do you need this feature?
      description: |
        Describe the user, problem, and scenario as clearly and accurately as possible.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the optimal solution
      description: |
        Describe the intended behavior and acceptance criteria. You may link comparable implementations for context.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the candidate solution
      description: |
        Describe alternative outcomes or tradeoffs you would accept.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Other information
      description: |
        Please provide any additional information about this feature suggestion.
    validations:
      required: false
