name: Singularity L0

on:
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/**"
      - "README*.md"
      - "LICENSE"
      - "NOTICE"
      - "Dockerfile*"
      - "app/**"
      - "config/**"
      - "docs/**"
      - "enterprise/**"
      - "kernel/**"
      - "output/md/**"
      - "plans/**"
      - "scripts/singularity/**"
  push:
    branches:
      - master
    paths:
      - ".dockerignore"
      - ".github/**"
      - "README*.md"
      - "LICENSE"
      - "NOTICE"
      - "Dockerfile*"
      - "app/**"
      - "config/**"
      - "docs/**"
      - "enterprise/**"
      - "kernel/**"
      - "output/md/**"
      - "plans/**"
      - "scripts/singularity/**"

permissions:
  contents: read

jobs:
  repository-governance:
    if: ${{ github.repository == 'SparkElf/singularity' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Register read-only SiYuan upstream
        run: |
          git remote add upstream https://github.com/siyuan-note/siyuan.git
          git remote set-url --push upstream DISABLED
          git fetch --no-tags upstream master

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 11.9.0

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: enterprise/pnpm-lock.yaml

      - name: Install governance dependencies
        run: pnpm install --frozen-lockfile
        working-directory: enterprise

      - name: Verify fork governance
        run: node scripts/singularity/verify-upstream-baseline.mjs

      - name: Test governance policy
        run: pnpm run test:l0-governance
        working-directory: enterprise

      - name: Report pinned upstream impact
        run: |
          node scripts/singularity/report-upstream-impact.mjs \
            --json artifacts/upstream-impact/upstream-impact.json \
            --markdown artifacts/upstream-impact/upstream-impact.md

      - name: Upload upstream impact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: upstream-impact-${{ github.sha }}
          path: artifacts/upstream-impact/
          if-no-files-found: error
          retention-days: 30

  enterprise-web:
    if: ${{ github.repository == 'SparkElf/singularity' }}
    needs: repository-governance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 11.9.0

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            enterprise/pnpm-lock.yaml
            app/pnpm-lock.yaml

      - name: Install enterprise dependencies
        run: pnpm install --frozen-lockfile
        working-directory: enterprise

      - name: Install SiYuan app dependencies
        run: corepack pnpm@11.12.0 install --frozen-lockfile
        working-directory: app

      - name: Verify B4
        run: pnpm verify:b4
        working-directory: enterprise

  space-session:
    if: ${{ github.repository == 'SparkElf/singularity' }}
    needs: repository-governance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SINGULARITY_TEST_DATABASE_URL: postgresql://singularity_test:singularity_test@127.0.0.1:55432/singularity_test
    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_USER: singularity_test
          POSTGRES_PASSWORD: singularity_test
          POSTGRES_DB: singularity_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U singularity_test -d singularity_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 11.9.0

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            enterprise/pnpm-lock.yaml
            app/pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: kernel/go.mod
          cache-dependency-path: kernel/go.sum

      - name: Install enterprise dependencies
        run: pnpm install --frozen-lockfile
        working-directory: enterprise

      - name: Install SiYuan app dependencies
        run: corepack pnpm@11.12.0 install --frozen-lockfile
        working-directory: app

      - name: Install Playwright Chromium
        run: pnpm --filter @singularity/web exec playwright install --with-deps chromium
        working-directory: enterprise

      - name: Verify S0-S3
        run: pnpm verify:s0-s3
        working-directory: enterprise

  p5-e2e:
    if: ${{ github.repository == 'SparkElf/singularity' }}
    needs: repository-governance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SINGULARITY_TEST_DATABASE_URL: postgresql://singularity_test:singularity_test@127.0.0.1:55432/singularity_test
    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_USER: singularity_test
          POSTGRES_PASSWORD: singularity_test
          POSTGRES_DB: singularity_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U singularity_test -d singularity_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 11.9.0

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            enterprise/pnpm-lock.yaml
            app/pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: kernel/go.mod
          cache-dependency-path: kernel/go.sum

      - name: Install enterprise dependencies
        run: pnpm install --frozen-lockfile
        working-directory: enterprise

      - name: Install SiYuan app dependencies
        run: corepack pnpm@11.12.0 install --frozen-lockfile
        working-directory: app

      - name: Install Playwright Chromium
        run: pnpm --filter @singularity/web exec playwright install --with-deps chromium
        working-directory: enterprise

      - name: Run P5 real-chain E2E
        id: p5_runner
        continue-on-error: true
        run: pnpm test:e2e
        working-directory: enterprise

      - name: Validate P5 structured report
        id: p5_report
        if: ${{ always() }}
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const reportPath = "apps/web/test-results/e2e-report.json";
          const report = JSON.parse(readFileSync(reportPath, "utf8"));
          if (report === null || typeof report !== "object" || Array.isArray(report)) {
            throw new Error("P5 Playwright report root is invalid");
          }
          const pending = Array.isArray(report.suites) ? [...report.suites] : [];
          const suites = [];
          while (pending.length > 0) {
            const suite = pending.pop();
            if (suite === null || typeof suite !== "object" || Array.isArray(suite)) {
              throw new Error("P5 Playwright report suite is invalid");
            }
            suites.push(suite);
            if (Array.isArray(suite.suites)) {
              pending.push(...suite.suites);
            }
          }
          const specs = suites.flatMap((suite) =>
            Array.isArray(suite.specs) ? suite.specs : []
          );
          const tests = specs.flatMap((spec) =>
            spec !== null && typeof spec === "object" && Array.isArray(spec.tests)
              ? spec.tests
              : []
          );
          if (suites.length === 0 || specs.length === 0 || tests.length === 0) {
            throw new Error(
              `P5 Playwright report is empty; suites=${suites.length} specs=${specs.length} tests=${tests.length}`,
            );
          }
          process.stdout.write(
            `P5 report: suites=${suites.length} specs=${specs.length} tests=${tests.length}\n`,
          );
          NODE
        working-directory: enterprise

      - name: Upload P5 E2E evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: p5-e2e-${{ github.sha }}
          path: |
            enterprise/apps/web/test-results/e2e-report.json
            enterprise/apps/web/test-results/e2e/
          if-no-files-found: warn
          retention-days: 30

      - name: Enforce P5 E2E outcomes
        if: ${{ always() }}
        env:
          P5_REPORT_OUTCOME: ${{ steps.p5_report.outcome }}
          P5_RUNNER_OUTCOME: ${{ steps.p5_runner.outcome }}
        run: |
          if [ "$P5_RUNNER_OUTCOME" != "success" ] || [ "$P5_REPORT_OUTCOME" != "success" ]; then
            printf 'P5 runner outcome: %s\nP5 report outcome: %s\n' \
              "$P5_RUNNER_OUTCOME" "$P5_REPORT_OUTCOME" >&2
            exit 1
          fi

  kernel-baseline:
    if: ${{ github.repository == 'SparkElf/singularity' }}
    needs: repository-governance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: kernel/go.mod
          cache-dependency-path: kernel/go.sum

      - name: Test Kernel
        run: go test -vet=off -tags="fts5 sqlcipher" ./...
        working-directory: kernel

  supply-chain:
    if: ${{ github.repository == 'SparkElf/singularity' }}
    needs: repository-governance
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      API_IMAGE: singularity-api:${{ github.sha }}
      WORKER_IMAGE: singularity-worker:${{ github.sha }}
      WEB_IMAGE: singularity-web:${{ github.sha }}
      SINGULARITY_DB_SCHEMA: public
      SINGULARITY_AUDIT_WRITER_ROLE: singularity_audit_writer
      SINGULARITY_AUDIT_READER_ROLE: singularity_audit_reader
    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_USER: singularity_test
          POSTGRES_PASSWORD: singularity_test
          POSTGRES_DB: singularity_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U singularity_test -d singularity_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 11.9.0

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            app/pnpm-lock.yaml
            enterprise/pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: kernel/go.mod
          cache-dependency-path: kernel/go.sum

      - name: Read upstream baseline
        run: |
          node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const baseline = JSON.parse(readFileSync("config/upstream-baseline.json", "utf8"));
            if (!/^[0-9a-f]{40}$/.test(baseline.upstreamCommit)) {
              throw new Error("Invalid upstream baseline commit");
            }
            process.stdout.write(`UPSTREAM_COMMIT=${baseline.upstreamCommit}\n`);
          ' >> "$GITHUB_ENV"

      - name: Build enterprise images
        run: |
          docker build \
            --file enterprise/apps/api/Dockerfile \
            --build-arg VCS_REF="$GITHUB_SHA" \
            --build-arg UPSTREAM_COMMIT="$UPSTREAM_COMMIT" \
            --tag "$API_IMAGE" \
            .
          docker build \
            --file enterprise/apps/web/Dockerfile \
            --build-arg VCS_REF="$GITHUB_SHA" \
            --build-arg UPSTREAM_COMMIT="$UPSTREAM_COMMIT" \
            --tag "$WEB_IMAGE" \
            .
          docker build \
            --file enterprise/apps/worker/Dockerfile \
            --build-arg VCS_REF="$GITHUB_SHA" \
            --build-arg UPSTREAM_COMMIT="$UPSTREAM_COMMIT" \
            --tag "$WORKER_IMAGE" \
            .

      - name: Verify image metadata
        run: |
          node scripts/singularity/verify-container-metadata.mjs \
            --revision "$GITHUB_SHA" \
            -- "$API_IMAGE" "$WORKER_IMAGE" "$WEB_IMAGE"

      - name: Install enterprise dependencies for container smoke
        run: pnpm install --frozen-lockfile
        working-directory: enterprise

      - name: Provision audit capability roles for migration deploy
        env:
          DATABASE_URL: postgresql://singularity_test:singularity_test@127.0.0.1:55432/singularity_test
        run: |
          psql --no-psqlrc --set=ON_ERROR_STOP=1 "$DATABASE_URL" <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'singularity_audit_writer') THEN
              CREATE ROLE singularity_audit_writer NOLOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOBYPASSRLS;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'singularity_audit_reader') THEN
              CREATE ROLE singularity_audit_reader NOLOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOBYPASSRLS;
            END IF;
          END
          $$;
          SQL

      - name: Apply enterprise migrations and audit ACL
        env:
          DATABASE_URL: postgresql://singularity_test:singularity_test@127.0.0.1:55432/singularity_test
        run: pnpm --filter @singularity/database deploy
        working-directory: enterprise

      - name: Smoke enterprise images
        env:
          DATABASE_URL: postgresql://singularity_test:singularity_test@127.0.0.1:55432/singularity_test
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          containers=()
          cleanup() {
            local original_status=$?
            local cleanup_status=0
            trap - EXIT
            for container in "${containers[@]}"; do
              docker rm --force "$container" >/dev/null 2>&1 || cleanup_status=1
            done
            chmod 0700 "$secret_dir" || cleanup_status=1
            rm -rf "$secret_dir" || cleanup_status=1
            if [ "$original_status" -ne 0 ]; then
              exit "$original_status"
            fi
            exit "$cleanup_status"
          }
          report_container_failure() {
            local container="$1"
            docker inspect --format '{{json .State.Health.Log}}' "$container" || true
            docker logs "$container" || true
          }
          wait_for_health() {
            local container="$1"
            for _ in {1..60}; do
              local state
              local health
              state="$(docker inspect --format '{{.State.Status}}' "$container" 2>/dev/null || true)"
              health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "$container" 2>/dev/null || true)"
              if [ "$state" = "running" ] && [ "$health" = "healthy" ]; then
                return 0
              fi
              if [ "$state" != "running" ] || [ "$health" = "unhealthy" ]; then
                report_container_failure "$container"
                return 1
              fi
              sleep 1
            done
            report_container_failure "$container"
            return 1
          }
          trap cleanup EXIT
          audit_key="$(openssl rand -base64 32 | tr '+/' '-_' | tr -d '=\n')"
          openssl genpkey -algorithm ED25519 -out "$secret_dir/service.key"
          openssl req -x509 -newkey rsa:2048 -nodes \
            -subj "/CN=kernel.invalid" \
            -addext "subjectAltName=DNS:kernel.invalid,DNS:worker.invalid,IP:127.0.0.1" \
            -keyout "$secret_dir/client.key" \
            -out "$secret_dir/client.crt" \
            -days 1
          cp "$secret_dir/client.crt" "$secret_dir/ca.crt"
          openssl pkey -in "$secret_dir/service.key" -pubout -out "$secret_dir/service.pub"
          jq -n --rawfile publicKeyPem "$secret_dir/service.pub" \
            '{keys: [{kid: "ci-key", publicKeyPem: $publicKeyPem}]}' \
            > "$secret_dir/service-keys.json"
          jq -n '{
            deployments: [{
              caCertificateFile: "/run/secrets/singularity/ca.crt",
              clientCertificateFile: "/run/secrets/singularity/client.crt",
              clientPrivateKeyFile: "/run/secrets/singularity/client.key",
              handle: "ci-kernel",
              hostname: "127.0.0.1",
              kernelInstanceId: "00000000-0000-4000-8000-000000000001",
              port: 9443,
              serverName: "kernel.invalid",
              spaceId: "00000000-0000-4000-8000-000000000002"
            }]
          }' > "$secret_dir/deployments.json"
          chmod 0555 "$secret_dir"
          chmod 0444 "$secret_dir"/*
          docker run --detach --name singularity-api-smoke --network host \
            --mount "type=bind,source=$secret_dir,target=/run/secrets/singularity,readonly" \
            --env DATABASE_URL="$DATABASE_URL" \
            --env SINGULARITY_AUDIT_HMAC_KEY="$audit_key" \
            --env SINGULARITY_AUDIT_KEY_VERSION="ci-audit-v1" \
            --env SINGULARITY_KERNEL_DEPLOYMENTS_FILE="/run/secrets/singularity/deployments.json" \
            --env SINGULARITY_KERNEL_RUNTIME_CA_FILE="/run/secrets/singularity/ca.crt" \
            --env SINGULARITY_KERNEL_RUNTIME_CLIENT_CERTIFICATE_FILE="/run/secrets/singularity/client.crt" \
            --env SINGULARITY_KERNEL_RUNTIME_CLIENT_PRIVATE_KEY_FILE="/run/secrets/singularity/client.key" \
            --env SINGULARITY_KERNEL_RUNTIME_TLS_PROFILE="ci-runtime" \
            --env SINGULARITY_KERNEL_SERVICE_KEY_ID="ci-key" \
            --env SINGULARITY_KERNEL_SERVICE_PRIVATE_KEY_FILE="/run/secrets/singularity/service.key" \
            --env SINGULARITY_PUBLIC_ORIGIN="https://singularity.invalid" \
            "$API_IMAGE"
          containers+=(singularity-api-smoke)
          docker run --detach --name singularity-worker-smoke --network host \
            --mount "type=bind,source=$secret_dir,target=/run/secrets/singularity,readonly" \
            --env DATABASE_URL="$DATABASE_URL" \
            --env SINGULARITY_AUDIT_HMAC_KEY="$audit_key" \
            --env SINGULARITY_AUDIT_KEY_VERSION="ci-audit-v1" \
            --env SINGULARITY_KERNEL_DEPLOYMENTS_FILE="/run/secrets/singularity/deployments.json" \
            --env SINGULARITY_KERNEL_SERVICE_KEY_ID="ci-key" \
            --env SINGULARITY_KERNEL_SERVICE_PRIVATE_KEY_FILE="/run/secrets/singularity/service.key" \
            --env SINGULARITY_WORKER_BACKUP_REQUEST_TIMEOUT_MS="300000" \
            --env SINGULARITY_WORKER_ID="ci-worker" \
            --env SINGULARITY_WORKER_RESTORE_ARCHIVE_TIMEOUT_MS="300000" \
            --env SINGULARITY_WORKER_RESTORE_CLIENT_CA_FILE="/run/secrets/singularity/ca.crt" \
            --env SINGULARITY_WORKER_RESTORE_CLIENT_CERT_FILE="/run/secrets/singularity/client.crt" \
            --env SINGULARITY_WORKER_RESTORE_CLIENT_KEY_FILE="/run/secrets/singularity/client.key" \
            --env SINGULARITY_WORKER_RESTORE_GATEWAY_CLIENT_DNS_NAME="worker.invalid" \
            --env SINGULARITY_WORKER_RESTORE_GATEWAY_HOSTNAME="127.0.0.1" \
            --env SINGULARITY_WORKER_RESTORE_KERNEL_LISTEN_ADDRESS="127.0.0.1" \
            --env SINGULARITY_WORKER_RESTORE_PORT_FIRST="19443" \
            --env SINGULARITY_WORKER_RESTORE_PORT_LAST="19443" \
            --env SINGULARITY_WORKER_RESTORE_SERVER_CERT_FILE="/run/secrets/singularity/client.crt" \
            --env SINGULARITY_WORKER_RESTORE_SERVER_KEY_FILE="/run/secrets/singularity/client.key" \
            --env SINGULARITY_WORKER_RESTORE_SERVER_NAME="kernel.invalid" \
            --env SINGULARITY_WORKER_RESTORE_SERVICE_KEYS_FILE="/run/secrets/singularity/service-keys.json" \
            --env SINGULARITY_WORKER_RESTORE_TLS_PROFILE="ci-runtime" \
            "$WORKER_IMAGE"
          containers+=(singularity-worker-smoke)
          docker run --detach --name singularity-web-smoke --network host "$WEB_IMAGE"
          containers+=(singularity-web-smoke)
          wait_for_health singularity-api-smoke
          wait_for_health singularity-worker-smoke
          wait_for_health singularity-web-smoke
          curl --fail --silent --show-error http://127.0.0.1:3001/api/v1/health/database \
            | jq --exit-status '. == {"status":"ready"}' >/dev/null
          test "$(curl --fail --silent --show-error http://127.0.0.1:8080/healthz)" = "ok"

      - name: Prepare supply-chain reports
        run: mkdir -p artifacts/supply-chain

      - name: Materialize enterprise license metadata
        run: pnpm install --frozen-lockfile --force --ignore-scripts
        working-directory: enterprise

      - name: Materialize SiYuan license metadata
        run: corepack pnpm@11.12.0 install --frozen-lockfile --force --ignore-scripts
        working-directory: app

      - name: Materialize Go license metadata
        run: go mod vendor
        working-directory: kernel

      - name: Generate source SBOM
        id: source_sbom
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.72.0
          scan-type: fs
          scan-ref: .
          scanners: license
          format: cyclonedx
          output: artifacts/supply-chain/source.trivy.cdx.json
          trivy-config: config/trivy.yaml

      - name: Generate API image SBOM
        id: api_sbom
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.72.0
          scan-type: image
          image-ref: ${{ env.API_IMAGE }}
          scanners: license
          format: cyclonedx
          output: artifacts/supply-chain/api.trivy.cdx.json
          trivy-config: config/trivy.yaml

      - name: Generate Worker image SBOM
        id: worker_sbom
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.72.0
          scan-type: image
          image-ref: ${{ env.WORKER_IMAGE }}
          scanners: license
          format: cyclonedx
          output: artifacts/supply-chain/worker.trivy.cdx.json
          trivy-config: config/trivy.yaml

      - name: Generate Web image SBOM
        id: web_sbom
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.72.0
          scan-type: image
          image-ref: ${{ env.WEB_IMAGE }}
          scanners: license
          format: cyclonedx
          output: artifacts/supply-chain/web.trivy.cdx.json
          trivy-config: config/trivy.yaml

      - name: Enforce production dependency closure
        id: production_sbom_policy
        continue-on-error: true
        run: |
          node scripts/singularity/verify-production-sbom.mjs \
            --api-image "$API_IMAGE" \
            --api artifacts/supply-chain/api.trivy.cdx.json \
            --worker-image "$WORKER_IMAGE" \
            --worker artifacts/supply-chain/worker.trivy.cdx.json \
            --web artifacts/supply-chain/web.trivy.cdx.json \
            --output artifacts/supply-chain/production-sbom-policy.json

      - name: Enrich source SBOM license evidence
        id: source_sbom_evidence
        continue-on-error: true
        run: |
          node scripts/singularity/enrich-license-sbom.mjs \
            --policy config/license-policy.json \
            --input artifacts/supply-chain/source.trivy.cdx.json \
            --output artifacts/supply-chain/source.cdx.json

      - name: Enrich API SBOM license evidence
        id: api_sbom_evidence
        continue-on-error: true
        run: |
          node scripts/singularity/enrich-license-sbom.mjs \
            --policy config/license-policy.json \
            --input artifacts/supply-chain/api.trivy.cdx.json \
            --output artifacts/supply-chain/api.cdx.json \
            --image "$API_IMAGE"

      - name: Enrich Worker SBOM license evidence
        id: worker_sbom_evidence
        continue-on-error: true
        run: |
          node scripts/singularity/enrich-license-sbom.mjs \
            --policy config/license-policy.json \
            --input artifacts/supply-chain/worker.trivy.cdx.json \
            --output artifacts/supply-chain/worker.cdx.json \
            --image "$WORKER_IMAGE" \
            --reference artifacts/supply-chain/source.cdx.json

      - name: Enrich Web SBOM license evidence
        id: web_sbom_evidence
        continue-on-error: true
        run: |
          node scripts/singularity/enrich-license-sbom.mjs \
            --policy config/license-policy.json \
            --input artifacts/supply-chain/web.trivy.cdx.json \
            --output artifacts/supply-chain/web.cdx.json \
            --image "$WEB_IMAGE"

      - name: Scan source licenses
        id: source_license
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.72.0
          scan-type: fs
          scan-ref: .
          scanners: license
          format: json
          output: artifacts/supply-chain/source-licenses.json
          trivy-config: config/trivy.yaml

      - name: Scan API image licenses
        id: api_license
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.72.0
          scan-type: image
          image-ref: ${{ env.API_IMAGE }}
          scanners: license
          format: json
          output: artifacts/supply-chain/api-licenses.json
          trivy-config: config/trivy.yaml

      - name: Scan Worker image licenses
        id: worker_license
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.72.0
          scan-type: image
          image-ref: ${{ env.WORKER_IMAGE }}
          scanners: license
          format: json
          output: artifacts/supply-chain/worker-licenses.json
          trivy-config: config/trivy.yaml

      - name: Scan Web image licenses
        id: web_license
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.72.0
          scan-type: image
          image-ref: ${{ env.WEB_IMAGE }}
          scanners: license
          format: json
          output: artifacts/supply-chain/web-licenses.json
          trivy-config: config/trivy.yaml

      - name: Enforce license policy
        id: license_policy
        continue-on-error: true
        run: |
          node scripts/singularity/check-license-reports.mjs \
            --policy config/license-policy.json \
            --output artifacts/supply-chain/license-policy.json \
            --report artifacts/supply-chain/source-licenses.json \
            --sbom artifacts/supply-chain/source.cdx.json \
            --report artifacts/supply-chain/api-licenses.json \
            --sbom artifacts/supply-chain/api.cdx.json \
            --report artifacts/supply-chain/worker-licenses.json \
            --sbom artifacts/supply-chain/worker.cdx.json \
            --report artifacts/supply-chain/web-licenses.json \
            --sbom artifacts/supply-chain/web.cdx.json

      - name: Scan enterprise source vulnerabilities
        id: enterprise_vulnerability
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.72.0
          scan-type: fs
          scan-ref: enterprise
          scanners: vuln
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 0
          format: json
          output: artifacts/supply-chain/enterprise-vulnerabilities.json
          trivy-config: config/trivy.yaml

      - name: Scan API High and Critical vulnerabilities
        id: api_vulnerability
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.72.0
          scan-type: image
          image-ref: ${{ env.API_IMAGE }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 0
          format: json
          output: artifacts/supply-chain/api-vulnerabilities.json

      - name: Scan Worker High and Critical vulnerabilities
        id: worker_vulnerability
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.72.0
          scan-type: image
          image-ref: ${{ env.WORKER_IMAGE }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 0
          format: json
          output: artifacts/supply-chain/worker-vulnerabilities.json

      - name: Scan Web High and Critical vulnerabilities
        id: web_vulnerability
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.72.0
          scan-type: image
          image-ref: ${{ env.WEB_IMAGE }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 0
          format: json
          output: artifacts/supply-chain/web-vulnerabilities.json

      - name: Enforce vulnerability policy
        id: vulnerability_policy
        continue-on-error: true
        run: |
          node scripts/singularity/check-vulnerability-reports.mjs \
            --output artifacts/supply-chain/vulnerability-policy.json \
            --report artifacts/supply-chain/enterprise-vulnerabilities.json \
            --report artifacts/supply-chain/api-vulnerabilities.json \
            --report artifacts/supply-chain/worker-vulnerabilities.json \
            --report artifacts/supply-chain/web-vulnerabilities.json

      - name: Upload supply-chain reports
        if: ${{ always() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: singularity-supply-chain-${{ github.sha }}
          path: artifacts/supply-chain/
          if-no-files-found: error
          retention-days: 30

      - name: Enforce supply-chain outcomes
        if: ${{ always() }}
        env:
          API_LICENSE: ${{ steps.api_license.outcome }}
          API_SBOM: ${{ steps.api_sbom.outcome }}
          API_SBOM_EVIDENCE: ${{ steps.api_sbom_evidence.outcome }}
          API_VULNERABILITY: ${{ steps.api_vulnerability.outcome }}
          ENTERPRISE_VULNERABILITY: ${{ steps.enterprise_vulnerability.outcome }}
          LICENSE_POLICY: ${{ steps.license_policy.outcome }}
          PRODUCTION_SBOM_POLICY: ${{ steps.production_sbom_policy.outcome }}
          SOURCE_LICENSE: ${{ steps.source_license.outcome }}
          SOURCE_SBOM: ${{ steps.source_sbom.outcome }}
          SOURCE_SBOM_EVIDENCE: ${{ steps.source_sbom_evidence.outcome }}
          WEB_LICENSE: ${{ steps.web_license.outcome }}
          WEB_SBOM: ${{ steps.web_sbom.outcome }}
          WEB_SBOM_EVIDENCE: ${{ steps.web_sbom_evidence.outcome }}
          WEB_VULNERABILITY: ${{ steps.web_vulnerability.outcome }}
          WORKER_LICENSE: ${{ steps.worker_license.outcome }}
          WORKER_SBOM: ${{ steps.worker_sbom.outcome }}
          WORKER_SBOM_EVIDENCE: ${{ steps.worker_sbom_evidence.outcome }}
          WORKER_VULNERABILITY: ${{ steps.worker_vulnerability.outcome }}
          VULNERABILITY_POLICY: ${{ steps.vulnerability_policy.outcome }}
        run: |
          for outcome in \
            "$API_LICENSE" \
            "$API_SBOM" \
            "$API_SBOM_EVIDENCE" \
            "$API_VULNERABILITY" \
            "$ENTERPRISE_VULNERABILITY" \
            "$LICENSE_POLICY" \
            "$PRODUCTION_SBOM_POLICY" \
            "$SOURCE_LICENSE" \
            "$SOURCE_SBOM" \
            "$SOURCE_SBOM_EVIDENCE" \
            "$WEB_LICENSE" \
            "$WEB_SBOM" \
            "$WEB_SBOM_EVIDENCE" \
            "$WEB_VULNERABILITY" \
            "$WORKER_LICENSE" \
            "$WORKER_SBOM" \
            "$WORKER_SBOM_EVIDENCE" \
            "$WORKER_VULNERABILITY" \
            "$VULNERABILITY_POLICY"; do
            if [ "$outcome" != "success" ]; then
              exit 1
            fi
          done
