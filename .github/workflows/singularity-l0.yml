name: Singularity L0

on:
  pull_request:
    paths:
      - ".github/workflows/singularity-l0.yml"
      - "app/src/block/Panel.ts"
      - "app/src/boot/onGetConfig.ts"
      - "app/src/card/makeCard.ts"
      - "app/src/editor/util.ts"
      - "app/src/host/**"
      - "app/src/index.ts"
      - "app/src/layout/**"
      - "app/src/menus/commonMenuItem.ts"
      - "app/src/protyle/**"
      - "app/src/types/protyle.d.ts"
      - "app/src/window/init.ts"
      - "app/webpack*.js"
      - "config/**"
      - "enterprise/**"
      - "kernel/**"
      - "scripts/singularity/**"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/singularity-l0.yml"
      - "app/src/block/Panel.ts"
      - "app/src/boot/onGetConfig.ts"
      - "app/src/card/makeCard.ts"
      - "app/src/editor/util.ts"
      - "app/src/host/**"
      - "app/src/index.ts"
      - "app/src/layout/**"
      - "app/src/menus/commonMenuItem.ts"
      - "app/src/protyle/**"
      - "app/src/types/protyle.d.ts"
      - "app/src/window/init.ts"
      - "app/webpack*.js"
      - "config/**"
      - "enterprise/**"
      - "kernel/**"
      - "scripts/singularity/**"

permissions:
  contents: read

jobs:
  enterprise-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Register SiYuan upstream
        run: git remote add upstream https://github.com/siyuan-note/siyuan.git

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11.9.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            enterprise/pnpm-lock.yaml
            app/pnpm-lock.yaml

      - name: Install enterprise dependencies
        run: pnpm install --frozen-lockfile
        working-directory: enterprise

      - name: Install SiYuan app dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app

      - name: Verify upstream baseline
        run: node scripts/singularity/verify-upstream-baseline.mjs

      - name: Verify B4
        run: pnpm verify:b4
        working-directory: enterprise

      - name: Install Playwright Chromium
        run: pnpm --filter @singularity/web exec playwright install --with-deps chromium
        working-directory: enterprise

      - name: Static workspace browser check
        run: pnpm test:shell
        working-directory: enterprise

  space-session:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SINGULARITY_TEST_DATABASE_URL: postgresql://singularity_test:singularity_test@127.0.0.1:5432/singularity_test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: singularity_test
          POSTGRES_PASSWORD: singularity_test
          POSTGRES_DB: singularity_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U singularity_test -d singularity_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11.9.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: enterprise/pnpm-lock.yaml

      - name: Install enterprise dependencies
        run: pnpm install --frozen-lockfile
        working-directory: enterprise

      - name: Verify S0-S3
        run: pnpm verify:s0-s3
        working-directory: enterprise

  kernel-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: kernel/go.mod
          cache-dependency-path: kernel/go.sum

      - name: Test Kernel
        run: go test -vet=off -tags=fts5 ./...
        working-directory: kernel
