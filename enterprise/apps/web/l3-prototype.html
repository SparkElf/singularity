<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f8f7" />
    <title>奇点 · L3 语义协作原型</title>
    <style>
      :root {
        color-scheme: light;
        --l3-background: #f7f8f7;
        --l3-surface: #ffffff;
        --l3-foreground: #222222;
        --l3-muted: #6a6f76;
        --l3-border: #dfe3e8;
        --l3-primary: #3575f0;
        --l3-primary-soft: rgba(53, 117, 240, .12);
        --l3-success: #3f8d4d;
        --l3-warning: #aa6a00;
        --l3-radius: 6px;
        font-family: "Emojis Additional", "Emojis Reset", BlinkMacSystemFont, Helvetica, Arial, sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; min-width: 320px; min-height: 100dvh; background: var(--l3-background); color: var(--l3-foreground); }
      main { width: min(920px, calc(100% - 32px)); margin: 0 auto; padding: 32px 0 48px; }
      header { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 24px; }
      h1 { margin: 0; font-size: 24px; line-height: 1.2; font-weight: 650; }
      .eyebrow { margin: 0 0 8px; color: var(--l3-muted); font-size: 12px; letter-spacing: .04em; }
      .state { display: inline-flex; align-items: center; gap: 7px; border: 1px solid var(--l3-border); border-radius: var(--l3-radius); padding: 7px 10px; background: var(--l3-surface); color: var(--l3-success); font-size: 12px; white-space: nowrap; }
      .state[data-state="revoked"] { color: var(--l3-warning); }
      .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
      .grid { display: grid; grid-template-columns: minmax(0, 1fr) 280px; gap: 16px; }
      section { border: 1px solid var(--l3-border); border-radius: var(--l3-radius); background: var(--l3-surface); }
      .document { min-height: 420px; padding: 22px; }
      .document h2 { margin: 0 0 16px; font-size: 15px; font-weight: 600; }
      .block { min-height: 120px; border-left: 2px solid var(--l3-primary); padding: 14px 16px; background: #fbfcff; }
      .block p { margin: 0; line-height: 1.65; }
      .block[data-confirmed="true"] { border-left-color: var(--l3-success); }
      .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
      button { border: 1px solid var(--l3-border); border-radius: var(--l3-radius); padding: 8px 12px; background: var(--l3-surface); color: var(--l3-foreground); cursor: pointer; font: inherit; font-size: 13px; }
      button.primary { border-color: var(--l3-primary); background: var(--l3-primary); color: white; }
      button:disabled { cursor: not-allowed; opacity: .48; }
      aside { padding: 18px; }
      aside h2 { margin: 0 0 14px; font-size: 14px; font-weight: 600; }
      dl { display: grid; gap: 10px; margin: 0; }
      dt { color: var(--l3-muted); font-size: 11px; }
      dd { margin: 2px 0 0; overflow-wrap: anywhere; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }
      .presence { display: grid; gap: 8px; margin-top: 20px; }
      .presence-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; border-top: 1px solid var(--l3-border); padding-top: 9px; font-size: 12px; }
      .presence-row strong { color: var(--l3-primary); font-weight: 600; }
      .audit { margin-top: 18px; border-top: 1px solid var(--l3-border); padding-top: 12px; color: var(--l3-muted); font-size: 11px; line-height: 1.5; }
      .signals { display: grid; gap: 8px; margin-top: 18px; border-top: 1px solid var(--l3-border); padding-top: 14px; }
      .signal { display: flex; justify-content: space-between; gap: 12px; font-size: 12px; }
      .signal span:first-child { color: var(--l3-muted); }
      .signal strong { color: var(--l3-success); font-weight: 600; }
      @media (max-width: 680px) { main { width: min(100% - 20px, 560px); padding-top: 20px; } header { display: block; } .state { margin-top: 14px; } .grid { grid-template-columns: 1fr; } .document { min-height: 360px; } }
    </style>
  </head>
  <body data-singularity-ui="l3-prototype">
    <main>
      <header>
        <div>
          <p class="eyebrow">奇点 · L3.0 语义协作原型</p>
          <h1>实时操作确认工作台</h1>
        </div>
        <div class="state" data-testid="session-state" data-state="ready"><span class="dot"></span><span data-testid="session-state-label">ready · editor</span></div>
      </header>
      <div class="grid">
        <section class="document" aria-labelledby="document-heading">
          <h2 id="document-heading">语义文档投影</h2>
          <article class="block" data-testid="document-block" data-confirmed="false">
            <p data-testid="document-content">等待语义操作确认</p>
          </article>
          <div class="controls">
            <button class="primary" data-testid="submit-operation" type="button">提交插入操作</button>
            <button data-testid="undo-operation" type="button" disabled>撤销当前操作</button>
            <button data-testid="revoke-session" type="button">模拟权限撤销</button>
          </div>
          <p class="audit" data-testid="operation-status">尚未提交操作</p>
          <div class="signals" aria-live="polite">
            <div class="signal"><span>块引用</span><strong data-testid="reference-state">等待确认</strong></div>
            <div class="signal"><span>嵌入目标</span><strong data-testid="embed-state">等待确认</strong></div>
            <div class="signal"><span>属性视图单元格</span><strong data-testid="av-cell-state">等待确认</strong></div>
          </div>
        </section>
        <aside aria-labelledby="identity-heading">
          <h2 id="identity-heading">当前内容身份</h2>
          <dl>
            <div><dt>organizationId</dt><dd data-testid="organization-id">11111111-1111-4111-8111-111111111111</dd></div>
            <div><dt>spaceId</dt><dd data-testid="space-id">22222222-2222-4222-8222-222222222222</dd></div>
            <div><dt>notebookId</dt><dd data-testid="notebook-id">20260722090001-bookabc</dd></div>
            <div><dt>documentId</dt><dd data-testid="document-id">20260722090000-docabcd</dd></div>
          </dl>
          <div class="presence" aria-live="polite">
            <h2>在线状态</h2>
            <div class="presence-row"><span>本地客户端</span><strong data-testid="presence-local">在线</strong></div>
            <div class="presence-row"><span>远端客户端</span><strong data-testid="presence-remote">等待加入</strong></div>
          </div>
        </aside>
      </div>
    </main>
    <script>
      (() => {
        const channel = "BroadcastChannel" in window ? new BroadcastChannel("singularity-l3-prototype") : null;
        const identity = {
          organizationId: "11111111-1111-4111-8111-111111111111",
          spaceId: "22222222-2222-4222-8222-222222222222",
          notebookId: "20260722090001-bookabc",
          documentId: "20260722090000-docabcd",
        };
        const clientId = crypto.randomUUID();
        const state = document.querySelector('[data-testid="session-state"]');
        const stateLabel = document.querySelector('[data-testid="session-state-label"]');
        const content = document.querySelector('[data-testid="document-content"]');
        const block = document.querySelector('[data-testid="document-block"]');
        const status = document.querySelector('[data-testid="operation-status"]');
        const submit = document.querySelector('[data-testid="submit-operation"]');
        const undo = document.querySelector('[data-testid="undo-operation"]');
        const revoke = document.querySelector('[data-testid="revoke-session"]');
        const remotePresence = document.querySelector('[data-testid="presence-remote"]');
        const reference = document.querySelector('[data-testid="reference-state"]');
        const embed = document.querySelector('[data-testid="embed-state"]');
        const avCell = document.querySelector('[data-testid="av-cell-state"]');
        const setState = (value) => {
          state.dataset.state = value;
          stateLabel.textContent = value + " · editor";
        };
        const applyAccepted = (operationId, text) => {
          content.textContent = text;
          block.dataset.confirmed = "true";
          reference.textContent = "已确认 · target block";
          embed.textContent = "已确认 · transclusion";
          avCell.textContent = "已确认 · cell value";
          undo.disabled = false;
          status.textContent = "已确认语义操作 " + operationId.slice(0, 8);
        };
        const applyUndo = () => {
          content.textContent = "等待语义操作确认";
          block.dataset.confirmed = "false";
          reference.textContent = "已撤销当前客户端操作";
          embed.textContent = "已撤销当前客户端操作";
          avCell.textContent = "已撤销当前客户端操作";
          undo.disabled = true;
          status.textContent = "已撤销当前客户端操作";
        };
        const publish = (message) => channel?.postMessage({ ...message, identity });
        submit.addEventListener("click", () => {
          if (state.dataset.state !== "ready") return;
          const operationId = crypto.randomUUID();
          const text = "已确认：客户端 " + clientId.slice(0, 8) + " 写入语义操作";
          applyAccepted(operationId, text);
          publish({ kind: "operation", operationId, text });
        });
        undo.addEventListener("click", () => {
          if (undo.disabled || state.dataset.state !== "ready") return;
          applyUndo();
          publish({ kind: "undo" });
        });
        revoke.addEventListener("click", () => {
          setState("revoked");
          submit.disabled = true;
          status.textContent = "权限已撤销，停止接受新操作";
          publish({ kind: "revoked" });
        });
        channel?.addEventListener("message", (event) => {
          const message = event.data;
          if (!message || JSON.stringify(message.identity) !== JSON.stringify(identity)) return;
          if (message.kind === "operation") {
            remotePresence.textContent = "已同步操作";
            if (state.dataset.state === "ready") applyAccepted(message.operationId, message.text);
          }
          if (message.kind === "undo" && state.dataset.state === "ready") applyUndo();
          if (message.kind === "presence") remotePresence.textContent = "在线";
          if (message.kind === "revoked") {
            setState("revoked");
            submit.disabled = true;
            status.textContent = "权限已撤销，停止接受新操作";
          }
        });
        publish({ kind: "presence" });
        window.addEventListener("pagehide", () => channel?.close(), { once: true });
      })();
    </script>
  </body>
</html>
