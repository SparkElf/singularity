worker_processes auto;
error_log /dev/stderr notice;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  map $request_uri $singularity_log_uri {
    default $request_uri;
    "~^/shares/[^/?]+(?:/[^?]*)?(?:\?.*)?$" /shares/:shareToken;
    "~^/api/v1/shares/[^/?]+(?:/[^?]*)?(?:\?.*)?$" /api/v1/shares/:shareToken;
  }

  log_format singularity '$remote_addr - $remote_user [$time_local] '
                         '"$request_method $singularity_log_uri $server_protocol" '
                         '$status $body_bytes_sent';
  access_log /dev/stdout singularity;
  sendfile on;
  keepalive_timeout 65;

  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp_path;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location /api/ {
      return 404;
    }

    location ^~ /shares/ {
      add_header Cache-Control "no-store" always;
      add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; font-src 'self'; connect-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; object-src 'none'" always;
      add_header Referrer-Policy "no-referrer" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
      try_files $uri $uri/ /index.html =404;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
